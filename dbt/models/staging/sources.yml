version: 2

sources:
  - name: raw
    database: ECOMMERCE_DB
    schema: RAW

    tables:
      - name: customers
        description: "Batch-loaded customer master data from PostgreSQL via Airflow."
        config:
          loaded_at_field: _INGESTED_AT
          freshness:
            warn_after: {count: 24, period: hour}
            error_after: {count: 48, period: hour}

      - name: products
        description: "Batch-loaded product catalog from PostgreSQL via Airflow."
        config:
          loaded_at_field: _INGESTED_AT
          freshness:
            warn_after: {count: 24, period: hour}
            error_after: {count: 48, period: hour}

      - name: suppliers
        description: "Batch-loaded supplier master data from PostgreSQL via Airflow."
        config:
          loaded_at_field: _INGESTED_AT
          freshness:
            warn_after: {count: 24, period: hour}
            error_after: {count: 48, period: hour}

      - name: orders_history
        description: "Batch-loaded historical orders from PostgreSQL via Airflow."
        config:
          loaded_at_field: _INGESTED_AT
          freshness:
            warn_after: {count: 24, period: hour}
            error_after: {count: 48, period: hour}

      - name: order_items
        description: "Batch-loaded order line items from PostgreSQL via Airflow."
        config:
          loaded_at_field: _INGESTED_AT
          freshness:
            warn_after: {count: 24, period: hour}
            error_after: {count: 48, period: hour}

      - name: orders_stream
        description: "Kafka-streamed real-time order events landed to S3 and loaded via Airflow."
        config:
          loaded_at_field: _LOADED_AT
          freshness:
            warn_after: {count: 1, period: hour}
            error_after: {count: 6, period: hour}

      - name: clickstream
        description: "Kafka-streamed user clickstream events landed to S3 and loaded via Airflow."
        config:
          loaded_at_field: _LOADED_AT
          freshness:
            warn_after: {count: 1, period: hour}
            error_after: {count: 6, period: hour}

      - name: inventory_updates
        description: "Kafka-streamed inventory change events landed to S3 and loaded via Airflow."
        config:
          loaded_at_field: _LOADED_AT
          freshness:
            warn_after: {count: 1, period: hour}
            error_after: {count: 6, period: hour}