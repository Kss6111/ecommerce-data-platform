name: Python Lint and Tests

on:
  push:

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8==7.3.0 pytest==9.0.3 python-dotenv==1.2.2

      - name: Lint Python sources
        run: python -m flake8 --jobs 1 --select=E9,F63,F7,F82 scripts airflow/dags tests

      - name: Run pytest
        run: python -m pytest tests --ignore=tests/test_day3_connections.py
